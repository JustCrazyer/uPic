name: Build uPic

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Use Xcode 16.4
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.4'

      - name: Show Xcode version
        shell: bash
        run: |
          xcodebuild -version
          xcrun swift --version

      - name: Locate workspace/project
        id: locate
        shell: bash
        run: |
          WORKSPACE=$(find . -maxdepth 1 -type d -name "*.xcworkspace" ! -path "*/Pods/*" | sort | head -n 1)
          PROJECT=$(find . -maxdepth 1 -type d -name "*.xcodeproj" ! -path "*/Pods/*" | sort | head -n 1)

          echo "workspace=$WORKSPACE" >> "$GITHUB_OUTPUT"
          echo "project=$PROJECT" >> "$GITHUB_OUTPUT"

          echo "WORKSPACE=$WORKSPACE"
          echo "PROJECT=$PROJECT"

          test -n "$WORKSPACE" -o -n "$PROJECT"

      - name: List schemes
        shell: bash
        run: |
          if [ -n "${{ steps.locate.outputs.workspace }}" ]; then
            xcodebuild -list -workspace "${{ steps.locate.outputs.workspace }}"
          else
            xcodebuild -list -project "${{ steps.locate.outputs.project }}"
          fi

      - name: Resolve Swift packages
        shell: bash
        run: |
          if [ -n "${{ steps.locate.outputs.workspace }}" ]; then
            xcodebuild -resolvePackageDependencies \
              -workspace "${{ steps.locate.outputs.workspace }}" \
              -scheme "uPic(Release)"
          else
            xcodebuild -resolvePackageDependencies \
              -project "${{ steps.locate.outputs.project }}" \
              -scheme "uPic(Release)"
          fi

      - name: Build
        shell: bash
        run: |
          set -o pipefail

          COMMON_ARGS=(
            -scheme "uPic(Release)"
            -configuration Release
            -destination "generic/platform=macOS"
            -derivedDataPath build
            CODE_SIGN_STYLE=Manual
            CODE_SIGN_IDENTITY=""
            CODE_SIGNING_REQUIRED=NO
            CODE_SIGNING_ALLOWED=NO
            DEVELOPMENT_TEAM=""
          )

          if [ -n "${{ steps.locate.outputs.workspace }}" ]; then
            xcodebuild \
              -workspace "${{ steps.locate.outputs.workspace }}" \
              "${COMMON_ARGS[@]}" \
              clean build 2>&1 | tee build.log
          else
            xcodebuild \
              -project "${{ steps.locate.outputs.project }}" \
              "${COMMON_ARGS[@]}" \
              clean build 2>&1 | tee build.log
          fi

          BUILD_EXIT=${PIPESTATUS[0]}

          if [ $BUILD_EXIT -ne 0 ]; then
            echo "================ ERROR LINES ================"
            grep -n " error: " build.log || true
            echo "================ FAIL LINES ================"
            grep -n " failed" build.log || true
            echo "================ LAST 200 LINES ================"
            tail -n 200 build.log || true
            exit $BUILD_EXIT
          fi

      - name: Find app
        id: app
        shell: bash
        run: |
          APP_PATH=$(find build/Build/Products -type d -name "*.app" | sort | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "No .app found"
            find build -maxdepth 6 | sort || true
            exit 1
          fi

          ZIP_PATH="${APP_PATH}.zip"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ZIP_PATH"

          echo "app_path=$APP_PATH" >> "$GITHUB_OUTPUT"
          echo "zip_path=$ZIP_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload app artifact
        uses: actions/upload-artifact@v7
        with:
          name: uPic-app
          path: ${{ steps.app.outputs.zip_path }}
          if-no-files-found: error

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-log
          path: build.log
          if-no-files-found: ignore
