name: Build uPic

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inspect files
        run: |
          pwd
          ls -la
          find . -maxdepth 3 \( -name "Podfile" -o -name "*.xcodeproj" -o -name "*.xcworkspace" -o -name "Package.resolved" -o -name "Package.swift" \) | sort

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project uPic.xcodeproj

      - name: List schemes
        run: |
          xcodebuild -list -project uPic.xcodeproj

      - name: Build
        run: |
          xcodebuild \
            -project uPic.xcodeproj \
            -scheme uPic \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: Package app
        run: |
          cd build/Build/Products/Release
          zip -r uPic.app.zip uPic.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: uPic-app
          path: build/Build/Products/Release/uPic.app.zip
