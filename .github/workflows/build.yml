name: 构建 uPic（无签名）

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 编译 uPic（使用 target）
        run: |
          xcodebuild -project uPic.xcodeproj \
            -target uPic \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: 打包应用
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "uPic.app" -type d | head -1)
          mkdir -p output
          cp -R "$APP_PATH" output/
          cd output
          zip -r ../uPic.zip uPic.app

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: uPic-未签名
          path: uPic.zip
