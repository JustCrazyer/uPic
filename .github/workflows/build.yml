name: Build uPic

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inspect repo
        run: |
          pwd
          ls -la
          find . -maxdepth 3 \( -name Podfile -o -name "*.xcodeproj" -o -name "*.xcworkspace" \) | sort

      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods
          pod --version

      - name: Install Pods
        working-directory: ./uPic
        run: |
          pod install --repo-update --verbose

      - name: List schemes
        working-directory: ./uPic
        run: |
          xcodebuild -list -workspace uPic.xcworkspace

      - name: Build
        working-directory: ./uPic
        run: |
          xcodebuild \
            -workspace uPic.xcworkspace \
            -scheme uPic \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: Package app
        working-directory: ./uPic
        run: |
          cd build/Build/Products/Release
          zip -r uPic.app.zip uPic.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: uPic-app
          path: uPic/build/Build/Products/Release/uPic.app.zip
